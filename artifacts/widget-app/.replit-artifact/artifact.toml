kind = "mobile"
previewPath = "/"
title = "Widget App"
version = "1.0.0"
id = "artifacts/widget-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19568

[services.development]
run = "pnpm --filter @workspace/widget-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/widget-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/widget-app", "run", "serve" ]

[services.env]
PORT = "19568"
BASE_PATH = "/"
